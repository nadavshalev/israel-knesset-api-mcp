services:
  mcp:
    build: .
    container_name: open-knesset-mcp
    restart: unless-stopped
    env_file:
      - .env
    command: ["/app/docker/mcp-entrypoint.sh"]
    ports:
      - "${MCP_PORT:-8000}:${MCP_PORT:-8000}"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:${MCP_PORT:-8000}${MCP_ENDPOINT:-/mcp}', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  updater:
    build: .
    container_name: open-knesset-updater
    restart: unless-stopped
    env_file:
      - .env
    command: ["/app/docker/updater-entrypoint.sh"]

