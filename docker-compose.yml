services:
  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: open-knesset-mcp
    restart: unless-stopped
    env_file:
      - .env
    command: ["/app/docker/mcp-entrypoint.sh"]
    ports:
      - "${MCP_PORT:-8000}:${MCP_PORT:-8000}"
    healthcheck:
      test: ["CMD", "/app/docker/mcp-healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  updater:
    build:
      context: .
      dockerfile: Dockerfile.update
    container_name: open-knesset-updater
    restart: unless-stopped
    env_file:
      - .env
    command: ["/app/docker/updater-entrypoint.sh"]
